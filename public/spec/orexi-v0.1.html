const Btn = (variant, size, label, extra='') => {
  const v = {
    primary:   'bg-brand text-white hover:bg-brand-hover',
    secondary: 'bg-surface text-ink border border-line hover:border-ink-soft',
    accent:    'bg-accent text-white hover:bg-accent-hover',
    ghost:     'text-ink-soft hover:text-ink hover:bg-brand-soft',
    danger:    'text-danger border border-danger/40 hover:bg-danger/5',
  };
  const s = { sm:'h-8 px-3 text-[13px]', md:'h-10 px-4 text-[14px]', lg:'h-12 px-5 text-[15px]' };
  return `<button class="inline-flex items-center justify-center gap-2 font-medium rounded transition ${v[variant]} ${s[size]} ${extra}">${label}</button>`;
};
const Input = ({label, hint, placeholder, type='text', value=''}) => `
  <label class="block">
    ${label?`<span class="block text-[13px] font-medium text-ink mb-1.5">${label}</span>`:''}
    <input type="${type}" value="${value}" placeholder="${placeholder||''}"
      class="w-full h-10 px-3 bg-surface border border-line rounded-xs text-[14px] text-ink placeholder:text-ink-faint focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/15 transition">
    ${hint?`<span class="block text-[12px] text-ink-soft mt-1.5">${hint}</span>`:''}
  </label>`;
const Pill = (tone, label) => {
  const t = {
    neutral:'bg-brand-soft text-brand',
    accent: 'bg-accent-soft text-accent',
    success:'bg-[#E5F1EB] text-success',
    warn:   'bg-[#FBF1DA] text-[#A37620]',
    danger: 'bg-[#F6E1E1] text-danger',
  };
  return `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-sm text-[11px] font-semibold uppercase tracking-[0.08em] ${t[tone]}">${label}</span>`;
};

        <div class="bg-surface border border-line rounded-md shadow-sm divide-y divide-line">
          ${mock.vendors.map(v => `
            <div class="p-4 flex items-center gap-3 hover:bg-brand-soft/20 transition">
              <div class="w-10 h-10 rounded-sm bg-accent-soft text-accent flex items-center justify-center shrink-0">${icons.shop}</div>
              <div class="flex-1 min-w-0">
                <div class="font-semibold text-[14px] truncate">${L(v.name, v.name_en)}</div>
                <div class="text-[12px] text-ink-soft mt-0.5 flex flex-wrap gap-x-1.5">
                  ${(state.lang==='el'?v.tags_el:v.tags_en).map(tag => `<span>${tag}</span>`).join('<span class="text-ink-faint">·</span>')}
                </div>
              </div>
              <div class="num text-[12px] text-ink-soft shrink-0">
                ${v.distance < 1000 ? `${v.distance} ${t('eh_meters')}` : `${(v.distance/1000).toFixed(1)} ${t('eh_km')}`}
              </div>
            </div>`).join('')}
        </div>
        <div class="mt-3 text-[12px] text-ink-faint px-1">
          ${L('Βάσει της προεπιλεγμένης σας διεύθυνσης εργασίας.',
              'Based on your default office address.')}
        </div>
      </div>
    </div>

    <!-- Partner strip -->
    <div class="bg-accent-soft border border-accent/20 rounded-md p-5 flex items-start gap-4">
      <div class="w-10 h-10 rounded-sm bg-accent text-white flex items-center justify-center shrink-0">${icons.bell}</div>
      <div class="flex-1">
        <div class="font-semibold text-[14.5px]">${L('Νέο κατάστημα στη λίστα σας: Mezze Athens','New vendor in your list: Mezze Athens')}</div>
        <div class="text-[13px] text-ink-soft mt-0.5">${L('Μεζεδοπωλείο, 190m από το γραφείο σας. Ενεργή συμφωνία από 01/04.','Mezze-style taverna, 190m from your office. Active as of Apr 1.')}</div>
      </div>
      <button class="text-[12px] text-ink-faint hover:text-ink self-start">×</button>
    </div>
  </section>`;
};

/* ===================================================================
   Router
   =================================================================== */
const pages = {
  'overview':   page_overview,
  'tokens':     page_tokens,
  'components': page_components,
  'login':      page_login,
  'emp-home':   page_emp_home,
};

function render() {
  const route = pages[state.route] ? state.route : 'overview';
  document.documentElement.lang = state.lang;
  document.getElementById('app').innerHTML = Header() + pages[route]() + Footer();
  attach();
}
function attach() {
  document.querySelectorAll('[data-lang]').forEach(b => {
    b.addEventListener('click', () => {
      state.lang = b.dataset.lang;
      localStorage.setItem('orexi.lang', state.lang);
      render();
    });
  });
}
window.addEventListener('hashchange', () => {
  state.route = location.hash.slice(1) || 'overview';
  render();
});
render();
</script>
</body>
