[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  publish = "dist"

# NOTE: redirects live in public/_redirects (not here) because Netlify
# evaluates _redirects BEFORE netlify.toml. Keeping /api/* alongside the
# /* SPA fallback in _redirects ensures the API rewrite wins.
