<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg:      '#FAF7F2',
        surface: '#FFFFFF',
        ink:     { DEFAULT: '#1A2E24', soft: '#5A6B63', faint: '#8D9B93' },
        line:    '#E3DED4',
        brand:   { DEFAULT: '#2D4F3C', hover: '#244033', soft: '#E8EDE7' },
        accent:  { DEFAULT: '#D97948', hover: '#C66A3D', soft: '#FBEFE3' },
        success: '#3E8E5F',
        warn:    '#E0A443',
        danger:  '#C54B4B',
      },
      fontFamily: {
        display: ['Fraunces', 'Georgia', 'serif'],
        sans:    ['Inter', 'system-ui', 'sans-serif'],
        mono:    ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
      },
      boxShadow: {
        sm: '0 1px 2px rgba(26,46,36,0.04)',
        md: '0 4px 12px rgba(26,46,36,0.06)',
        lg: '0 8px 24px rgba(26,46,36,0.08)',
      },
      borderRadius: { xs: '4px', sm: '6px', DEFAULT: '8px', md: '12px', lg: '16px', xl: '24px' },
    },
  },
};

<style>
  :root{
    --bg:#FAF7F2; --surface:#fff; --ink:#1A2E24; --ink-soft:#5A6B63; --ink-faint:#8D9B93;
    --line:#E3DED4; --brand:#2D4F3C; --brand-hover:#244033; --brand-soft:#E8EDE7;
    --accent:#D97948; --accent-hover:#C66A3D; --accent-soft:#FBEFE3;
  }
  html,body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif}
  .font-display{font-family:'Fraunces',Georgia,serif;letter-spacing:-.015em;font-variation-settings:"opsz" 144}
  .num{font-family:'JetBrains Mono',ui-monospace,monospace;font-feature-settings:"tnum"}
  *:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.35;
    background-image:radial-gradient(rgba(45,79,60,0.025) 1px,transparent 1px);background-size:3px 3px;z-index:0}
  .swatch{box-shadow:inset 0 0 0 1px rgba(26,46,36,.05)}
  /* custom range-ish bar used in mini charts */
  .bar{background:linear-gradient(to top,var(--brand) 0%,var(--brand) var(--fill,30%),var(--brand-soft) var(--fill,30%),var(--brand-soft) 100%)}
  /* labelled check pill */
  .check-pill{cursor:pointer;user-select:none}
  .check-pill input{display:none}
  .check-pill input:checked ~ span{background:var(--brand);color:#fff;border-color:var(--brand)}
  /* toasts */
  #orexi-toasts{position:fixed;top:78px;right:24px;z-index:60;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .orexi-toast{pointer-events:auto;background:var(--surface);border:1px solid var(--line);box-shadow:0 8px 24px rgba(26,46,36,0.12);
    border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:10px;min-width:280px;max-width:420px;
    animation:toastIn 220ms cubic-bezier(.2,.8,.2,1)}
  .orexi-toast.leaving{animation:toastOut 220ms cubic-bezier(.4,0,1,1) forwards}
  .orexi-toast .dot{width:8px;height:8px;border-radius:9999px;flex-shrink:0}
  .orexi-toast.success .dot{background:#3E8E5F}
  .orexi-toast.error .dot{background:#C54B4B}
  .orexi-toast.info .dot{background:#2D4F3C}
  .orexi-toast.warn .dot{background:#E0A443}
  @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
  @keyframes toastOut{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-6px)}}
  /* modal */
  #orexi-modal-root{position:fixed;inset:0;z-index:70;display:none}
  #orexi-modal-root.open{display:flex;align-items:center;justify-content:center}
  #orexi-modal-root::before{content:'';position:absolute;inset:0;background:rgba(26,46,36,.35);backdrop-filter:blur(2px)}
  #orexi-modal-root .panel{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:12px;
    box-shadow:0 24px 60px rgba(26,46,36,.25);max-width:480px;width:calc(100% - 48px);padding:24px;
    animation:modalIn 220ms cubic-bezier(.2,.8,.2,1)}
  @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
  /* dropdown */
  .dd{position:relative}
  .dd > .dd-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:220px;background:var(--surface);border:1px solid var(--line);
    border-radius:8px;box-shadow:0 8px 24px rgba(26,46,36,.08);padding:6px;display:none;z-index:30}
  .dd.open > .dd-menu{display:block}
  /* sortable header */
  .sort-h{cursor:pointer;user-select:none}
  .sort-h:hover{color:var(--ink)}
  .sort-h .arr{display:inline-block;width:0;height:0;margin-left:6px;border-left:4px solid transparent;border-right:4px solid transparent;opacity:.4}
  .sort-h.asc .arr{border-bottom:4px solid currentColor;opacity:.95}
  .sort-h.desc .arr{border-top:4px solid currentColor;opacity:.95}
  /* search highlight */
  mark.orexi-mark{background:#FBE7C8;color:inherit;padding:0 1px;border-radius:2px}
</style>

/* ---------- Combined search + tab filter (preserves input focus) ---------- */
window.orexiApplyFilters = (scope) => {
  if (!scope) return;
  const rowSel = scope.dataset.rowSel || 'tbody tr[data-search]';
  const tabAttr = scope.dataset.tabAttr;
  const tabValue = scope.dataset.tabValue;
  const inputEl = scope.querySelector('input[type=search]');
  const q = (inputEl?.value || '').toLowerCase().trim();
  let shown = 0, total = 0;
  scope.querySelectorAll(rowSel).forEach(r => {
    total++;
    const tabOk = !tabAttr || !tabValue || tabValue === 'all' || (r.getAttribute('data-' + tabAttr) || '').toLowerCase() === tabValue.toLowerCase();
    const hay = (r.getAttribute('data-search') || '').toLowerCase();
    const searchOk = !q || hay.includes(q);
    const ok = tabOk && searchOk;
    r.style.display = ok ? '' : 'none';
    if (ok) shown++;
  });
  const counter = scope.querySelector('[data-filter-count]');
  if (counter) counter.textContent = shown;
  const empty = scope.querySelector('[data-filter-empty]');
  if (empty) empty.style.display = (shown === 0) ? '' : 'none';
};
window.orexiFilter = (input, rowSel) => {
  const scope = input.closest('[data-filter-scope]');
  if (scope && rowSel) scope.dataset.rowSel = rowSel;
  orexiApplyFilters(scope);
};
window.orexiTab = (btn, attr, value, rowSel) => {
  const scope = btn.closest('[data-filter-scope]');
  if (!scope) return;
  scope.querySelectorAll('[data-tab-btn]').forEach(b => {
    b.classList.remove('bg-surface','shadow-sm','text-ink');
    b.classList.add('text-ink-soft');
  });
  btn.classList.remove('text-ink-soft');
  btn.classList.add('bg-surface','shadow-sm','text-ink');
  scope.dataset.tabAttr = attr || '';
  scope.dataset.tabValue = value || '';
  if (rowSel) scope.dataset.rowSel = rowSel;
  orexiApplyFilters(scope);
};

/* ---------- Sortable table columns ---------- */
window.orexiSort = (th, type) => {
  const tbl = th.closest('table');
  const tbody = tbl.querySelector('tbody');
  const colIdx = Array.from(th.parentNode.children).indexOf(th);
  const cur = th.classList.contains('asc') ? 'asc' : (th.classList.contains('desc') ? 'desc' : null);
  const next = cur === 'asc' ? 'desc' : 'asc';
  tbl.querySelectorAll('.sort-h').forEach(h => h.classList.remove('asc','desc'));
  th.classList.add(next);
  const rows = Array.from(tbody.querySelectorAll('tr'));
  const get = (tr) => {
    const cell = tr.children[colIdx];
    if (!cell) return '';
    const v = cell.getAttribute('data-sort') ?? cell.textContent.trim();
    if (type === 'num') return parseFloat(String(v).replace(/[^0-9.\-]/g,'')) || 0;
    return v.toLowerCase();
  };
  rows.sort((a,b) => {
    const va = get(a), vb = get(b);
    if (va < vb) return next === 'asc' ? -1 : 1;
    if (va > vb) return next === 'asc' ? 1 : -1;
    return 0;
  });
  rows.forEach(r => tbody.appendChild(r));
};

/* ---------- Toast notifications ---------- */
window.orexiToast = (message, type='success', duration=2400) => {
  const root = document.getElementById('orexi-toasts');
  if (!root) return;
  const el = document.createElement('div');
  el.className = `orexi-toast ${type}`;
  el.innerHTML = `<span class="dot"></span><span class="text-[13.5px] flex-1">${message}</span><button class="text-ink-faint hover:text-ink text-[16px] leading-none" aria-label="Dismiss">×</button>`;
  el.querySelector('button').addEventListener('click', () => dismiss());
  function dismiss(){ el.classList.add('leaving'); setTimeout(()=>el.remove(),220); }
  root.appendChild(el);
  setTimeout(dismiss, duration);
};

/* ---------- Confirm modal ---------- */
window.orexiConfirm = ({title, body, confirmLabel='Confirm', cancelLabel='Cancel', danger=false, onConfirm}) => {
  const root = document.getElementById('orexi-modal-root');
  root.innerHTML = `
    <div class="panel">
      <h3 class="font-display text-[20px] font-semibold mb-2">${title}</h3>
      <p class="text-[14px] text-ink-soft leading-[20px] mb-6">${body || ''}</p>
      <div class="flex items-center justify-end gap-2">
        <button class="orexi-cancel inline-flex items-center justify-center h-10 px-4 bg-surface text-ink border border-line rounded font-medium text-[14px] hover:border-ink-soft">${cancelLabel}</button>
        <button class="orexi-ok inline-flex items-center justify-center h-10 px-4 ${danger?'bg-danger text-white hover:bg-danger/90':'bg-brand text-white hover:bg-brand-hover'} rounded font-medium text-[14px]">${confirmLabel}</button>
      </div>
    </div>`;
  root.classList.add('open');
  const close = () => { root.classList.remove('open'); root.innerHTML=''; };
  root.querySelector('.orexi-cancel').addEventListener('click', close);
  root.querySelector('.orexi-ok').addEventListener('click', () => {
    close();
    if (onConfirm) onConfirm();
  });
  root.addEventListener('click', (e) => { if (e.target === root) close(); }, { once:true });
};

const sparkbars = (series) => {
  const max = Math.max(...series.map(d => d.benefit + d.extra));
  return `
    <div class="flex items-end gap-[3px] h-[140px]">
      ${series.map(d => {
        const total = d.benefit + d.extra;
        const h = Math.max(2, (total/max)*140);
        const benefitH = (d.benefit/total)*h || 0;
        return `
          <div class="flex-1 flex flex-col justify-end group relative">
            <div class="relative w-full" style="height:${h}px">
              <div class="absolute inset-x-0 bottom-0 rounded-t-xs bg-brand" style="height:${benefitH}px"></div>
              <div class="absolute inset-x-0 rounded-t-xs bg-accent" style="top:0;height:${h-benefitH}px"></div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
};

  };
  const [tone, label] = map[s] || ['neutral', s];

};

function render() {
  // parse hash -> "persona/route"
  const raw = location.hash.slice(1) || 'home/home';
  const [p, r] = raw.split('/');
  const key = `${p}/${r}`;
  const rt = routes[key] || routes['home/home'];
  state.persona = rt.persona;
  state.route   = r || 'home';
  document.documentElement.lang = state.lang;

  const inner = rt.render();
  let html;
  if (state.persona === 'auth') {
    html = Header() + inner + Footer();
  } else if (state.persona === 'company') {
    html = Header() + `
      <div class="flex min-h-[calc(100vh-60px)]">
        ${coSidebar()}
        <div class="flex-1 min-w-0 bg-bg/30">${inner}</div>
      </div>` + Footer();
  } else if (state.persona === 'admin') {
    html = Header() + `
      <div class="flex min-h-[calc(100vh-60px)]">
        ${adminSidebar()}
        <div class="flex-1 min-w-0 bg-bg/30">${inner}</div>
      </div>` + Footer();
  } else if (state.persona === 'vendor') {
    html = Header() + `
      <div class="flex min-h-[calc(100vh-60px)]">
        ${vendorSidebar()}
        <div class="flex-1 min-w-0 bg-bg/30">${inner}</div>
      </div>` + Footer();
  } else if (state.persona === 'employee') {
    html = Header() + empSubnav() + inner + Footer();
  } else {
    html = Header() + inner + Footer();
  }

  document.getElementById('app').innerHTML = html;
  attach();
}

function attach() {
  document.querySelectorAll('[data-lang]').forEach(b => {
    b.addEventListener('click', () => {
      state.lang = b.dataset.lang;
      localStorage.setItem('orexi.lang', state.lang);
      render();
    });
  });
  /* benefit editor: assignment-mode radio cards */
  document.querySelectorAll('[data-be-assign]').forEach(el => {
    el.addEventListener('click', (ev) => {
      if (state.be_assign === el.dataset.beAssign) return;
      state.be_assign = el.dataset.beAssign;
      render();
    });
  });
}

/* Document-level listeners attach once, not per render. */
document.addEventListener('click', (ev) => {
  document.querySelectorAll('.dd.open').forEach(dd => {
    if (!dd.contains(ev.target)) dd.classList.remove('open');
  });
});
document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape') {
    const m = document.getElementById('orexi-modal-root');
    if (m && m.classList.contains('open')) { m.classList.remove('open'); m.innerHTML=''; ev.preventDefault(); return; }
    document.querySelectorAll('.dd.open').forEach(dd => dd.classList.remove('open'));
  }
  if (ev.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    const s = document.querySelector('input[type=search]');
    if (s) { s.focus(); ev.preventDefault(); }
  }
});

window.addEventListener('hashchange', render);
render();
